<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Nova Chance 360 | A Verdade Oculta do Sistema</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --ouro: #d4af37; --carvao: #1E272E; --preto: #0A0A0A; --grad: linear-gradient(135deg, #bf953f, #fcf6ba, #aa771c); }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--carvao); color: white; margin: 0; }
        header { background: var(--preto); padding: 20px; border-bottom: 1px solid var(--ouro); text-align: center; }
        .logo { font-family: 'Cinzel'; background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: bold; font-size: 1.5rem; text-decoration: none; }
        .container { max-width: 1100px; margin: 60px auto; padding: 0 20px; }
        h1 { font-family: 'Cinzel'; color: var(--ouro); text-align: center; font-size: 2.5rem; margin-bottom: 50px; }

        .blog-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; }

        .post-card {
            background: var(--preto);
            border: 1px solid #333;
            text-decoration: none;
            color: white;
            transition: 0.4s;
            border-bottom: 4px solid var(--ouro);
            display: flex;
            flex-direction: column;
        }

        .post-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .post-content { padding: 30px; }

        .post-content h2 {
            font-family: 'Cinzel';
            color: var(--ouro);
            font-size: 1.1rem;
            margin: 0 0 15px 0;
            line-height: 1.4;
        }

        .post-content p {
            font-size: 0.85rem;
            color: #aaa;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .read-more {
            font-weight: bold;
            color: var(--ouro);
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 1px;
        }

        footer {
            text-align: center;
            padding: 60px;
            color: #444;
            border-top: 1px solid #333;
            margin-top: 80px;
        }
    </style>
</head>

<body>
    <header>
        <a href="index.html" class="logo">NOVA CHANCE 360</a>
    </header>

    <div class="container">
        <h1>INTELIGÊNCIA FINANCEIRA</h1>

        <!-- BLOG AUTOMÁTICO -->
        <div class="blog-grid" id="blog"></div>
    </div>

    <footer>&copy; 2024 Nova Chance 360 - Estratégia de Elite.</footer>

    <div style="margin-top: 20px; font-size: 0.7rem; opacity: 0.5; text-align: center;">
        <a href="privacidade.html" style="color: #fff; margin: 0 10px; text-decoration: none;">Política de Privacidade</a> |
        <a href="termos.html" style="color: #fff; margin: 0 10px; text-decoration: none;">Termos de Uso</a>
    </div>

    <script>
        async function loadBlog() {
            const res = await fetch("./posts.json");
            const posts = await res.json();

            const container = document.getElementById("blog");

            container.innerHTML = posts.map(p => `
                <a href="./post.html?id=${p.id}" class="post-card">
                    <div class="post-content">
                        <h2>${p.title}</h2>
                        <p>${p.desc}</p>
                        <span class="read-more">Acessar Inteligência →</span>
                    </div>
                </a>
            `).join("");
        }

        loadBlog();
    </script>
</body>
</html>
