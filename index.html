<script>
fetch('../posts.json')
  .then(res => res.json())
  .then(posts => {

    document.getElementById('posts').innerHTML =
      posts.map(p => `
        <div class="post">
          <img src="${p.image}" style="width:100%; border-radius:10px;">
          <h2>${p.title}</h2>
          <p>${p.desc}</p>
          <a href="post.html?slug=${p.slug}">Ler mais</a>
        </div>
      `).join('');

  });
</script>
