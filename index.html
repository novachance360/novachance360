<script>
fetch('../posts.json')
  .then(res => res.json())
  .then(posts => {

    document.getElementById('posts').innerHTML =
      posts.map(p => `
        <div class="post">
          <img src="${p.image}" loading="lazy">
          <h2>${p.title}</h2>
          <p>${p.desc}</p>
          <a href="post.html?slug=${p.slug}">Ler mais</a>
        </div>
      `).join('');

  })
  .catch(() => {
    document.getElementById('posts').innerHTML =
      "<p>Erro ao carregar posts</p>";
  });
</script>
