<script>
fetch('/posts.json')
  .then(res => res.json())
  .then(posts => {

    const container = document.getElementById('posts');

    container.innerHTML = posts.map(p => `
      <div class="post">
        <img src="${p.image || 'https://via.placeholder.com/600x300'}" loading="lazy">
        <h2>${p.title}</h2>
        <p>${p.desc || ''}</p>
        <a href="post.html?slug=${p.slug || ''}">Ler mais</a>
      </div>
    `).join('');

  })
  .catch(err => {
    console.log(err);
    document.getElementById('posts').innerHTML =
      "<p>Erro ao carregar posts</p>";
  });
</script>
