<script>
const slug = new URLSearchParams(window.location.search).get("slug");

fetch('../posts.json')
  .then(res => res.json())
  .then(posts => {

    const post = posts.find(p => p.slug === slug);

    document.body.innerHTML = `
      <h1>${post.title}</h1>
      <img src="${post.image}" style="width:100%;">
      <p>${post.content}</p>
    `;

  });
</script>
